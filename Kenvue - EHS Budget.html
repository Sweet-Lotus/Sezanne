<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EHS Zero-Based Budget</title>
  <style>
    :root{
      --bg:#f5f0e8;
      --panel:#fffdf8;
      --ink:#1f2422;
      --muted:#69736f;
      --line:#e1d8cc;
      --kenvue:#00856f;
      --kenvue-dark:#006d5b;
      --teal-soft:#e6f4f1;
      --coral:#ff6b57;
      --coral-soft:#fff0ec;
      --sand:#f0ddc9;
      --cream:#fff8ef;
      --shadow:0 10px 24px rgba(0,74,62,.10);
      --r:15px;
      --font:Inter,Segoe UI,Arial,sans-serif;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:
        radial-gradient(circle at 12% -10%, rgba(0,133,111,.12), transparent 30%),
        radial-gradient(circle at 102% 0%, rgba(255,107,87,.10), transparent 24%),
        linear-gradient(135deg,#fffdf9 0%,var(--bg) 64%,#efe5d7 100%);
      font-family:var(--font);
      color:var(--ink);
      padding:18px;
      font-size:12px;
    }
    .app{max-width:1540px;margin:0 auto}
    header{display:flex;justify-content:space-between;gap:14px;align-items:center;margin-bottom:12px;background:var(--kenvue);border-radius:18px;padding:12px 14px;box-shadow:var(--shadow);position:relative;overflow:hidden}
    header::after{content:'';position:absolute;right:-70px;top:-90px;width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,.10)}
    .brand{display:flex;align-items:center;gap:14px;min-width:0;position:relative;z-index:1}
    .brand-logo{height:42px;width:auto;border-radius:10px;display:block}
    h1{margin:0;font-size:24px;letter-spacing:-.04em;line-height:1.05;color:white}
    .toolbar{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end;position:relative;z-index:1}
    button{
      border:1px solid var(--line);background:white;color:var(--ink);border-radius:999px;
      padding:7px 10px;font-weight:850;cursor:pointer;box-shadow:0 3px 9px rgba(39,28,20,.06);
      font-size:11px;white-space:nowrap;transition:.15s ease;
    }
    button:hover{border-color:#d3bfae;transform:translateY(-1px)}
    .primary{background:var(--coral);color:white;border-color:var(--coral)}
    .danger{color:#b84235}
    .small{padding:5px 7px;font-size:10.5px}
    .summary{display:grid;grid-template-columns:1.05fr 1fr .82fr .78fr 1.35fr;gap:9px;margin-bottom:12px}
    .card{background:rgba(255,253,248,.96);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:11px 12px;min-height:76px;position:relative;overflow:hidden}
    .card::before{content:'';position:absolute;left:0;right:0;top:0;height:4px;background:var(--kenvue)}
    .card::after{content:'';position:absolute;right:-20px;bottom:-22px;width:58px;height:58px;border-radius:50%;background:rgba(0,133,111,.07)}
    .card:nth-child(5)::before{background:var(--coral)}
    .label{font-size:9.5px;text-transform:uppercase;letter-spacing:.085em;font-weight:950;color:var(--muted)}
    .value{font-size:22px;font-weight:950;letter-spacing:-.045em;margin-top:5px;line-height:1.05}
    .value input{width:86px;border:0;background:transparent;font:inherit;font-weight:950;color:inherit;outline:0}
    .sub{font-size:10.5px;color:var(--muted);margin-top:4px;line-height:1.28}
    .mini-grid{display:grid;grid-template-columns:1fr auto;gap:2px 8px;margin-top:5px;font-size:10.5px}
    .mini-grid strong{font-size:11px;color:var(--ink)}
    .main{display:block}
    .top-actions{display:flex;justify-content:space-between;align-items:center;margin:0 0 9px 0;gap:10px}
    .toggle-note{font-size:11px;color:var(--muted)}
    .category{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:0 6px 17px rgba(39,28,20,.075);overflow:hidden;margin-bottom:10px}
    .cat-head{
      display:grid;grid-template-columns:34px minmax(260px,1fr) 105px 72px 170px;gap:12px;align-items:center;
      padding:9px 11px;background:#fffdf8;border-bottom:1px solid var(--line);border-left:5px solid var(--kenvue)
    }
    .toggle{
      width:29px;height:29px;display:grid;place-items:center;padding:0;border-radius:10px;
      font-size:20px;font-weight:1000;line-height:1;color:#111;background:white;border-color:#d8c8b8;box-shadow:none
    }
    .toggle::before{content:'▼';font-family:Arial,sans-serif;font-size:18px;color:#111}
    .category.collapsed .toggle::before{content:'▶';font-family:Arial,sans-serif;font-size:17px;color:#111}
    .cat-name{border:0;background:transparent;font-size:15px;font-weight:950;color:var(--ink);outline:0;width:100%;min-width:0}
    .cat-total{text-align:right;font-weight:950;font-size:15px;white-space:nowrap}
    .cat-share{text-align:right;color:var(--muted);font-weight:900;white-space:nowrap}
    .cat-actions{display:flex;justify-content:flex-end;gap:10px;align-items:center;min-width:165px;flex-shrink:0}
    .cat-actions button{min-width:74px;padding:6px 10px;white-space:nowrap}
    .category.collapsed .cat-body{display:none}
    table{width:100%;border-collapse:collapse;table-layout:fixed}
    th{text-align:left;color:var(--muted);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;padding:7px 8px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.35)}
    td{padding:6px 8px;border-bottom:1px solid #f0e6da;vertical-align:top}
    tr.disabled{opacity:.43}
    tr:last-child td{border-bottom:0}
    .active{width:38px;text-align:center}
    .cost-col{width:30%}
    .amount{width:120px;text-align:right}
    .calc-col{width:auto}
    .actions{width:100px;text-align:right}
    .item-input,.amount-input,.calc-input{width:100%;border:1px solid transparent;background:transparent;border-radius:8px;padding:6px;color:var(--ink);font:inherit}
    .item-input{font-weight:780;white-space:normal;line-height:1.22;min-height:32px;resize:vertical;overflow:hidden}
    .amount-input{text-align:right;font-weight:950;white-space:nowrap}
    .calc-input{min-height:42px;resize:vertical;color:#51453d;line-height:1.25;font-size:11.5px}
    .item-input:focus,.amount-input:focus,.calc-input:focus{background:white;border-color:#9fcdc4;outline:0;box-shadow:0 0 0 2px rgba(0,133,111,.12)}
    .hide-calcs .calc-cell,.hide-calcs .calc-head{display:none}
    .hide-calcs .cost-col{width:auto}
    .add-row{padding:9px 11px;border-top:1px solid var(--line);background:#fffdf9}
    .cat-strip{display:none}
    .mgmt-chip{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);background:var(--teal-soft);border-color:#c8e5de;border-radius:999px;padding:3px 8px;font-size:10.5px;font-weight:850;color:var(--kenvue-dark);margin-left:6px}
    .bar-mini{display:none}
    @media(max-width:1050px){.summary{grid-template-columns:repeat(2,1fr)}.cat-head{grid-template-columns:30px 1fr 84px 70px 150px;gap:9px}.cat-actions{min-width:145px;gap:8px}.cat-actions button{min-width:66px;padding:6px 8px}.cost-col{width:38%}.actions{width:92px}}
    @media print{body{background:white;padding:0}.toolbar,.cat-actions,.actions,.add-row,.toggle,.top-actions{display:none}.card,.category{box-shadow:none}.summary{grid-template-columns:repeat(5,1fr)}textarea,input{border:0!important;box-shadow:none!important}.cat-head{grid-template-columns:1fr 95px 70px}}
  </style>
</head>

    {id:uid(), active:true, name:'Forklift Training (warehouse & operators)', amount:4000, calc:'training or refreshers for warehouse and industrial handling activities'},
    {id:uid(), active:true, name:'Leadership Training (supervisors)', amount:2000, calc:'training for supervisors on EHS expectations, risk observation, escalation and field leadership'}
  ]},
  {id:uid(), name:'Fire Protection & Emergency Preparedness', collapsed:false, mgmt:'Risk Management', items:[
    {id:uid(), active:true, name:'Fire Inspections (annual checks)', amount:8000, calc:'annual checks for extinguishers, alarms, emergency lighting and fire protection equipment'},
    {id:uid(), active:true, name:'Fire Drills (external support)', amount:2000, calc:'practical drills, evacuation exercises, emergency scenario preparation and debriefing support'},
    {id:uid(), active:true, name:'Emergency Equipment (replacement stock)', amount:5000, calc:'emergency PPE, response material, evacuation support equipment, radios/signage'},
    {id:uid(), active:true, name:'Fire System Maintenance (detection / alarm)', amount:10000, calc:'maintenance for detection, alarm systems and fire protection interfaces'}
  ]},
  {id:uid(), name:'Occupational Health', collapsed:false, mgmt:'Compliance & People', items:[
    {id:uid(), active:true, name:'Medical Surveillance (workforce follow-up)', amount:12000, calc:'200 headcount × approx. €60/year. Health follow-up, medical visits and routine surveillance needs.'},
    {id:uid(), active:true, name:'Ergonomics (critical workstations)', amount:3000, calc:'ergonomic assessments and quick wins for manufacturing and packaging workstations'},
    {id:uid(), active:true, name:'Exposure Monitoring (noise / dust / chemical)', amount:5000, calc:'noise, dust or chemical exposure assessment'}
  ]},
  {id:uid(), name:'Regulatory Compliance', collapsed:false, mgmt:'Compliance & People', items:[
    {id:uid(), active:true, name:'Regulatory Watch (French HSE subscription)', amount:3000, calc:'annual subscription to Red-on-Line, Tennaxia or Actuel HSE'},
    {id:uid(), active:true, name:'External Compliance Audit (independent check)', amount:5000, calc:'One external audit/year, typical consultant rate €800-1,200/day over 4-5 days'},
    {id:uid(), active:true, name:'ICPE / Legal Support (expert advice)', amount:5000, calc:'support for permit modifications, environmental declarations'},
    {id:uid(), active:true, name:'Regulatory Inspection Preparation (buffer)', amount:2000, calc:'reserve for documentation updates, targeted measurements or specific authority requests'}
  ]}
];
function uid(){return Math.random().toString(36).slice(2,9)}
function eur(n){return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(Number(n)||0)}
function pct(n){return `${Math.round((Number(n)||0)*100)}%`}
function catTotal(c){return c.items.reduce((s,i)=>s+(i.active?Number(i.amount)||0:0),0)}
function total(){return data.reduce((s,c)=>s+catTotal(c),0)}
function activeLines(){return data.reduce((s,c)=>s+c.items.filter(i=>i.active).length,0)}
function managementTotals(){const order=['Risk Management','Environmental Excellence','Compliance & People'];const m={};data.forEach(c=>{m[c.mgmt||'Other']=(m[c.mgmt||'Other']||0)+catTotal(c)});return Object.fromEntries(Object.entries(m).sort((a,b)=>{const ia=order.indexOf(a[0]),ib=order.indexOf(b[0]);return (ia<0?99:ia)-(ib<0?99:ib)}))}
function render(){
  document.body.classList.toggle('hide-calcs', !showCalcs);
  const t=total();
  document.getElementById('totalBudget').textContent=eur(t);
  const hc=Math.max(1,Number(document.getElementById('headcount').value)||1);
  document.getElementById('perHeadcount').textContent=eur(t/hc);
  document.getElementById('activeLines').textContent=activeLines();
  const budget=document.getElementById('budget');budget.innerHTML='';
  data.forEach(c=>{
    const ct=catTotal(c);const share=t?ct/t:0;
    const sec=document.createElement('section');sec.className='category'+(c.collapsed?' collapsed':'');
    sec.innerHTML=`<div class="cat-strip"></div><div class="cat-head">
      <button class="toggle" onclick="toggleCat('${c.id}')" title="Expand / collapse"></button>
      <div><input class="cat-name" value="${escapeHtml(c.name)}" onchange="updateCat('${c.id}','name',this.value)"><span class="mgmt-chip">${escapeHtml(c.mgmt)}</span></div>
      <div class="cat-total">${eur(ct)}</div><div class="cat-share">${pct(share)}</div>
      <div class="cat-actions"><button class="small" onclick="addItem('${c.id}')">+ Cost</button><button class="small danger" onclick="deleteCat('${c.id}')">Delete</button></div>
    </div>
    <div class="cat-body"><table><thead><tr><th class="active">On</th><th class="cost-col">Cost line (purpose)</th><th class="amount">Budget</th><th class="calc-head calc-col">Calculation / justification</th><th class="actions">Actions</th></tr></thead><tbody>${c.items.map(i=>rowHtml(c.id,i)).join('')}</tbody></table></div>`;
    budget.appendChild(sec)
  });
  renderMgmtSummary();
}
function rowHtml(cid,i){return `<tr class="${i.active?'':'disabled'}"><td class="active"><input type="checkbox" ${i.active?'checked':''} onchange="updateItem('${cid}','${i.id}','active',this.checked)"></td><td><textarea class="item-input" onchange="updateItem('${cid}','${i.id}','name',this.value)">${escapeHtml(i.name)}</textarea></td><td><input class="amount-input" type="number" value="${Number(i.amount)||0}" onchange="updateItem('${cid}','${i.id}','amount',this.value)"></td><td class="calc-cell"><textarea class="calc-input" onchange="updateItem('${cid}','${i.id}','calc',this.value)">${escapeHtml(i.calc||'')}</textarea></td><td class="actions"><button class="small" onclick="duplicateItem('${cid}','${i.id}')">Copy</button><button class="small danger" onclick="deleteItem('${cid}','${i.id}')">Delete</button></td></tr>`}
function renderMgmtSummary(){const mt=managementTotals();const t=total();document.getElementById('mgmtSummary').innerHTML=Object.entries(mt).map(([k,v])=>`<span>${escapeHtml(k)}</span><strong>${eur(v)} · ${pct(t?v/t:0)}</strong>`).join('')}
function getCat(id){return data.find(c=>c.id===id)}function getItem(c,id){return c.items.find(i=>i.id===id)}
function updateCat(id,key,val){getCat(id)[key]=val;render()}function updateItem(cid,iid,key,val){const i=getItem(getCat(cid),iid);i[key]=key==='amount'?Number(val):val;render()}
function toggleCat(id){const c=getCat(id);c.collapsed=!c.collapsed;render()}function toggleAll(expand){data.forEach(c=>c.collapsed=!expand);render()}function toggleCalcs(){showCalcs=!showCalcs;document.getElementById('calcBtn').textContent=showCalcs?'Hide calculation / justification':'Show calculation / justification';render()}
function addCategory(){data.push({id:uid(),name:'New Category',collapsed:false,mgmt:'Other',items:[]});render()}function deleteCat(id){if(confirm('Delete this category and all cost lines?')){const idx=data.findIndex(c=>c.id===id);data.splice(idx,1);render()}}
function addItem(cid){getCat(cid).items.push({id:uid(),active:true,name:'New cost line (purpose)',amount:0,calc:'Calculation / justification'});render()}function deleteItem(cid,iid){const c=getCat(cid);c.items=c.items.filter(i=>i.id!==iid);render()}function duplicateItem(cid,iid){const c=getCat(cid),i=getItem(c,iid);c.items.push({...i,id:uid(),name:i.name+' copy'});render()}
function flatRows(){const rows=[];data.forEach(c=>c.items.forEach(i=>rows.push({Category:c.name,Management_View:c.mgmt,Active:i.active?'Yes':'No',Cost_Line:i.name,Budget_EUR:i.active?Number(i.amount)||0:0,Calculation_Justification:i.calc||''})));return rows}
function exportExcel(){
  const rows=flatRows();let html='<html><head><meta charset="utf-8"></head><body>';
  html+='<table border="1"><tr><th>Category</th><th>Management View</th><th>Active</th><th>Cost Line</th><th>Budget EUR</th><th>Calculation / Justification</th></tr>';
  rows.forEach(r=>{html+=`<tr><td>${escapeHtml(r.Category)}</td><td>${escapeHtml(r.Management_View)}</td><td>${r.Active}</td><td>${escapeHtml(r.Cost_Line)}</td><td>${r.Budget_EUR}</td><td>${escapeHtml(r.Calculation_Justification)}</td></tr>`});
  html+='</table><br><table border="1"><tr><th>Total Budget</th><td>'+total()+'</td></tr><tr><th>Headcount</th><td>'+document.getElementById('headcount').value+'</td></tr><tr><th>Budget / Headcount</th><td>'+Math.round(total()/(Number(document.getElementById('headcount').value)||1))+'</td></tr></table>';
  html+='<br><table border="1"><tr><th>Management View</th><th>Budget EUR</th></tr>';
  Object.entries(managementTotals()).forEach(([k,v])=>{html+=`<tr><td>${escapeHtml(k)}</td><td>${v}</td></tr>`});
  html+='</table></body></html>';
  download(new Blob([html],{type:'application/vnd.ms-excel;charset=utf-8'}),'ehs_zero_based_budget.xls')
}
function download(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)}
function escapeHtml(s){return String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}
render();
</script>
</body>
